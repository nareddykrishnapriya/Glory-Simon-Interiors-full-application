# Nixpacks config for Railway: Python 3.11 + Node.js 20 (no collision)
[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "npm install --prefix frontend"
]

[phases.build]
cmds = ["npm run build --prefix frontend"]

[start]
cmd = "gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT"
