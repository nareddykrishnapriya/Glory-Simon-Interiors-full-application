services:
  - type: web
    name: glory-simon-interiors
    env: python
    buildCommand: "pip install -r requirements.txt && npm install --prefix frontend && npm run build --prefix frontend"
    startCommand: "gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NODE_VERSION
        value: 20.11.0
      - key: DB_MODE
        value: sqlite
